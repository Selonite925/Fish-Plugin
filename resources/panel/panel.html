<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{title}}</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      min-height: 100%;
    }
    body {
      margin: 0;
      width: 1120px;
      min-height: 720px;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: #111827;
      background: #ffffff;
      overflow: hidden;
    }
    body.has-bg {
      color: #f6fbff;
      background-color: #0a1325;
      background-image:
        linear-gradient(rgba(8, 14, 24, 0.58), rgba(8, 14, 24, 0.78)),
        var(--panel-bg);
      background-size: cover, 100% auto;
      background-position: center, top center;
      background-repeat: no-repeat, repeat-y;
    }
    .page {
      width: 100%;
      min-height: 720px;
      padding: 24px;
    }
    .shell {
      min-height: 672px;
      border-radius: 18px;
      border: 1px solid rgba(15, 23, 42, 0.10);
      background: rgba(255,255,255,0.96);
      box-shadow: 0 12px 48px rgba(15, 23, 42, 0.10);
      padding: 44px 48px 32px;
    }
    body.has-bg .shell {
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(7, 12, 20, 0.56);
      box-shadow: 0 12px 48px rgba(0,0,0,0.26);
      backdrop-filter: blur(6px);
    }
    .title {
      margin: 0;
      font-size: 46px;
      line-height: 1.1;
      font-weight: 700;
    }
    .subtitle {
      margin-top: 14px;
      color: #475569;
      font-size: 22px;
      line-height: 1.5;
    }
    body.has-bg .subtitle {
      color: #b6c9e8;
    }
    .card {
      margin-top: 24px;
      border-radius: 8px;
      border: 1px solid rgba(15, 23, 42, 0.08);
      background: #f8fafc;
      padding: 36px 38px;
    }
    body.has-bg .card {
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.04));
    }
    .line {
      min-height: 38px;
      font-size: 24px;
      line-height: 1.45;
      color: #111827;
      word-break: break-word;
      white-space: pre-wrap;
      padding: 6px 12px;
      border-radius: 8px;
    }
    body.has-bg .line {
      color: #eaf2ff;
    }
    .line + .line {
      margin-top: 6px;
    }
    .line.item,
    .line.fish {
      background: rgba(255,255,255,0.62);
      border: 1px solid rgba(15, 23, 42, 0.06);
    }
    body.has-bg .line.item,
    body.has-bg .line.fish {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.08);
    }
    .line.heading {
      min-height: 30px;
      margin-top: 14px;
      padding: 0 4px 4px;
      color: #0f766e;
      font-size: 22px;
      font-weight: 700;
      border-bottom: 1px solid rgba(15, 118, 110, 0.24);
    }
    .line.heading:first-child {
      margin-top: 0;
    }
    body.has-bg .line.heading {
      color: #7dd3fc;
      border-bottom-color: rgba(125, 211, 252, 0.28);
    }
    .line.spacer {
      min-height: 10px;
      padding: 0;
      margin-top: 0;
    }
    .footer {
      margin-top: 22px;
      color: #64748b;
      font-size: 20px;
      line-height: 1.5;
    }
    body.has-bg .footer {
      color: #90a8c9;
    }
    .watermark {
      margin-top: 14px;
      text-align: right;
      color: rgba(100, 116, 139, 0.72);
      font-size: 15px;
      line-height: 1.4;
    }
    body.has-bg .watermark {
      color: rgba(203, 213, 225, 0.68);
    }
  </style>
</head>
  <body class="{{bodyClass}}" style="{{bodyStyle}}">
  <div class="page">
    <div class="shell">
      <h1 class="title">{{title}}</h1>
      <div class="subtitle">{{subtitle}}</div>
      <div class="card">
        {{each sections section}}
        <div class="line {{section.type}}">{{section.text}}</div>
        {{/each}}
      </div>
      <div class="footer">{{footer}}</div>
      <div class="watermark">Fish-Plugin 作者QQ：2691431889</div>
    </div>
  </div>
</body>
</html>
