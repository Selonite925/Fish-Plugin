<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{title}}</title>
  <style>
    * { box-sizing: border-box; }
    html {
      width: 1120px;
      min-height: 100%;
      margin: 0;
      background: #0a1325;
      overflow: hidden;
    }
    body {
      margin: 0;
      width: 1120px;
      min-height: 720px;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: #111827;
      background: #ffffff;
      overflow: hidden;
    }
    body.has-bg {
      color: #f6fbff;
      background-color: #0a1325;
      background-image:
        linear-gradient(rgba(8, 14, 24, 0.58), rgba(8, 14, 24, 0.78)),
        var(--panel-bg);
      background-size: 100% 100%, 100% auto;
      background-position: center, top center;
      background-repeat: no-repeat, repeat-y;
    }
    .page {
      width: 100%;
      min-height: 720px;
      padding: 24px;
    }
    .shell {
      min-height: 672px;
      border-radius: 18px;
      border: 1px solid rgba(15, 23, 42, 0.10);
      background: rgba(255,255,255,0.96);
      box-shadow: 0 12px 48px rgba(15, 23, 42, 0.10);
      padding: 44px 48px 32px;
    }
    body.has-bg .shell {
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(7, 12, 20, 0.56);
      box-shadow: 0 12px 48px rgba(0,0,0,0.26);
    }
    .title {
      margin: 0;
      font-size: 46px;
      line-height: 1.1;
      font-weight: 700;
    }
    .subtitle {
      margin-top: 14px;
      color: #475569;
      font-size: 22px;
      line-height: 1.5;
    }
    body.has-bg .subtitle {
      color: #b6c9e8;
    }
    .card {
      margin-top: 24px;
      border-radius: 8px;
      border: 1px solid rgba(15, 23, 42, 0.08);
      background: #f8fafc;
      padding: 36px 38px;
    }
    body.has-bg .card {
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.04));
    }
    .line {
      min-height: 38px;
      font-size: 24px;
      line-height: 1.45;
      color: #111827;
      word-break: break-word;
      white-space: pre-wrap;
      padding: 6px 12px;
      border-radius: 8px;
    }
    body.has-bg .line {
      color: #eaf2ff;
    }
    .line + .line {
      margin-top: 6px;
    }
    .line.item,
    .line.fish {
      background: rgba(255,255,255,0.62);
      border: 1px solid rgba(15, 23, 42, 0.06);
    }
    body.has-bg .line.item,
    body.has-bg .line.fish {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.08);
    }
    .line.heading {
      min-height: 30px;
      margin-top: 14px;
      padding: 0 4px 4px;
      color: #0f766e;
      font-size: 22px;
      font-weight: 700;
      border-bottom: 1px solid rgba(15, 118, 110, 0.24);
    }
    .line.heading:first-child {
      margin-top: 0;
    }
    body.has-bg .line.heading {
      color: #7dd3fc;
      border-bottom-color: rgba(125, 211, 252, 0.28);
    }
    .line.spacer {
      min-height: 10px;
      padding: 0;
      margin-top: 0;
    }
    .line.collection {
      padding: 0;
      background: transparent;
      border: none;
      min-height: auto;
    }
    .line.help-grid {
      padding: 0;
      background: transparent;
      border: none;
      min-height: auto;
    }
    .collection-title {
      margin: 14px 0 10px;
      padding: 0 4px 4px;
      font-size: 24px;
      font-weight: 700;
      color: var(--collection-text, #0f172a);
      border-bottom: 1px solid var(--collection-accent-soft, rgba(15, 23, 42, 0.12));
    }
    .collection-title:first-child {
      margin-top: 0;
    }
    .collection-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 2px 0 2px;
    }
    .collection-chip {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 5px 12px;
      border-radius: 999px;
      border: 1px dashed rgba(148, 163, 184, 0.46);
      background: rgba(226, 232, 240, 0.52);
      color: #94a3b8;
      font-size: 20px;
      line-height: 1.2;
    }
    .collection-chip.owned {
      border-style: solid;
      background: var(--chip-bg, rgba(255,255,255,0.9));
      border-color: var(--chip-border, rgba(15, 23, 42, 0.12));
      color: var(--chip-color, #111827);
      box-shadow: inset 0 0 0 1px var(--chip-shadow, rgba(255,255,255,0));
      font-weight: 700;
      text-shadow: 0 1px 0 rgba(255,255,255,0.35);
    }
    body.has-bg .collection-chip {
      border-color: rgba(148, 163, 184, 0.38);
      background: rgba(15, 23, 42, 0.34);
      color: #8fa2bf;
    }
    body.has-bg .collection-chip.owned {
      color: var(--chip-color, #f8fafc);
      box-shadow: inset 0 0 0 1px var(--chip-shadow, rgba(255,255,255,0.08));
      text-shadow: 0 1px 0 rgba(15, 23, 42, 0.25);
    }
    .help-grid-group {
      margin-top: 18px;
      border-radius: 24px;
      border: 1px solid rgba(148, 163, 184, 0.22);
      background: rgba(255, 255, 255, 0.58);
      box-shadow: 0 10px 34px rgba(15, 23, 42, 0.10), inset 0 1px 0 rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(12px);
      overflow: hidden;
    }
    .help-grid-group:first-child {
      margin-top: 0;
    }
    body.has-bg .help-grid-group {
      border-color: rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.10);
      box-shadow: 0 12px 42px rgba(0,0,0,0.22), inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .help-grid-title {
      padding: 18px 22px 12px;
      font-size: 28px;
      line-height: 1.3;
      font-weight: 700;
      color: #5b4b73;
      background: linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0));
      border-bottom: 1px solid rgba(125, 99, 135, 0.12);
      letter-spacing: 0.02em;
    }
    body.has-bg .help-grid-title {
      color: #f2e7ff;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0));
      border-bottom-color: rgba(255,255,255,0.10);
    }
    .help-grid {
      display: flex;
      flex-direction: column;
      padding: 0 14px 14px;
    }
    .help-grid-row {
      display: flex;
      align-items: stretch;
    }
    .help-grid-item {
      flex: 1 1 50%;
      min-height: 122px;
      border-radius: 0;
      border-top: 1px solid rgba(120, 117, 147, 0.12);
      border-right: 1px solid rgba(120, 117, 147, 0.12);
      background: rgba(255,255,255,0.12);
      padding: 18px 20px 16px 72px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 10px;
      position: relative;
    }
    body.has-bg .help-grid-item {
      border-top-color: rgba(255,255,255,0.10);
      border-right-color: rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
    }
    .help-grid-row .help-grid-item:last-child {
      border-right: none;
    }
    .help-grid-item-badge {
      position: absolute;
      left: 18px;
      top: 18px;
      width: 38px;
      height: 38px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 800;
      color: #fff7ed;
      background: linear-gradient(180deg, #b78d52, #8f5d2c);
      box-shadow: 0 6px 16px rgba(143, 93, 44, 0.26);
    }
    body.has-bg .help-grid-item-badge {
      color: #fff9f0;
      background: linear-gradient(180deg, #d5a15a, #8b5e2d);
      box-shadow: 0 8px 20px rgba(0,0,0,0.28);
    }
    .help-grid-item-title {
      color: #5b4b73;
      font-size: 21px;
      line-height: 1.32;
      font-weight: 700;
      word-break: break-word;
      white-space: pre-wrap;
    }
    body.has-bg .help-grid-item-title {
      color: #f5e8ff;
    }
    .help-grid-item-desc {
      color: #6b6a84;
      font-size: 17px;
      line-height: 1.45;
      word-break: break-word;
      white-space: pre-wrap;
    }
    body.has-bg .help-grid-item-desc {
      color: #d6dced;
    }
    .help-grid-item-note {
      flex-basis: 100%;
      min-height: auto;
    }
    .help-grid-item-empty {
      flex: 1 1 50%;
      min-height: 122px;
      background: transparent;
      border-top: 1px solid rgba(120, 117, 147, 0.12);
      border-right: none;
      visibility: hidden;
    }
    body.has-bg .help-grid-item-empty {
      border-top-color: rgba(255,255,255,0.10);
    }
    @media (max-width: 980px) {
      .help-grid-row {
        flex-direction: column;
      }
      .help-grid-item {
        border-right: none;
      }
      .help-grid-item-empty {
        display: none;
      }
    }
    .footer {
      margin-top: 22px;
      color: #64748b;
      font-size: 20px;
      line-height: 1.5;
    }
    body.has-bg .footer {
      color: #90a8c9;
    }
    .watermark {
      margin-top: 14px;
      text-align: right;
      color: rgba(100, 116, 139, 0.72);
      font-size: 15px;
      line-height: 1.4;
    }
    body.has-bg .watermark {
      color: rgba(203, 213, 225, 0.68);
    }
  </style>
</head>
  <body class="{{bodyClass}}" style="{{bodyStyle}}">
  <div class="page">
    <div class="shell">
      <h1 class="title">{{title}}</h1>
      <div class="subtitle">{{subtitle}}</div>
      <div class="card">
        {{each sections section}}
        {{if section.type === 'collection'}}
        <div class="line collection">
          <div class="collection-title" style="{{section.titleStyle}}">{{section.title}}</div>
          {{@ section.html}}
        </div>
        {{else if section.type === 'help-grid'}}
        <div class="line help-grid">
          <div class="help-grid-group" style="{{section.groupStyle}}">
            <div class="help-grid-title" style="{{section.titleStyle}}">{{section.title}}</div>
            {{@ section.html}}
          </div>
        </div>
        {{else}}
        <div class="line {{section.type}}">{{section.text}}</div>
        {{/if}}
        {{/each}}
      </div>
      <div class="footer">{{footer}}</div>
      <div class="watermark">Fish-Plugin 作者QQ：2691431889</div>
    </div>
  </div>
</body>
</html>
